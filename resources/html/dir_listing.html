<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of /var/www/public/</title>
    <style>
        :root {
            --text-color: #24292e;
            --link-color: #0366d6;
            --border-color: #eaecef;
            --bg-color: #ffffff;
            --hover-bg: #f6f8fa;
            --meta-color: #6a737d;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --text-color: #c9d1d9;
                --link-color: #58a6ff;
                --border-color: #30363d;
                --bg-color: #0d1117;
                --hover-bg: #161b22;
                --meta-color: #8b949e;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px 40px;
            line-height: 1.5;
        }

        h1 {
            font-size: 1.5em;
            font-weight: 400;
            margin-bottom: 10px;
            word-break: break-all;
        }

        hr {
            border: 0;
            border-bottom: 1px solid var(--border-color);
            margin: 10px 0 20px 0;
        }

        table {
            width: 100%;
            max-width: 1200px;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-weight: 600;
            color: var(--text-color);
            white-space: nowrap;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        tbody tr:hover {
            background-color: var(--hover-bg);
        }

        .col-name { width: 50%; }
        .col-date { width: 30%; color: var(--meta-color); font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 0.9em; }
        .col-size { width: 20%; color: var(--meta-color); font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 0.9em; text-align: right; }

        .icon {
            margin-right: 8px;
            opacity: 0.7;
            font-family: "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.85em;
            color: var(--meta-color);
            font-style: italic;
        }

        @media (max-width: 600px) {
            body { padding: 15px; }
            .col-date { display: none; } /* Hide date on small screens */
            .col-name { width: 70%; }
            .col-size { width: 30%; }
        }
    </style>
</head>
<body>

    <main>
        <h1 id="path-header">Index of {PATH}</h1>
        <hr>

        <table>
            <thead>
                <tr>
                    <th class="col-name">Name</th>
                    <th class="col-date">Last Modified</th>
                    <th class="col-size">Size</th>
                </tr>
            </thead>
            <tbody id="directory-list">
                {LISTING}
            </tbody>
        </table>
        <hr>
        <div class="footer">42webserv/0.1.0</div>
    </main>

    <!-- =================================================================== -->
    <!-- TEST SCRIPT: DELETE THIS SCRIPT TAG WHEN INTEGRATING INTO SERVER    -->
    <!-- This is just to show you what the populated table looks like.       -->
    <!-- =================================================================== -->
    <script>
        const mockFiles = [
            { name: "..", url: "../", isDir: true, date: "-", size: "-" },
            { name: "css", url: "css/", isDir: true, date: "2023-10-24 14:32:10", size: "-" },
            { name: "images", url: "images/", isDir: true, date: "2023-10-24 14:32:15", size: "-" },
            { name: "index.html", url: "index.html", isDir: false, date: "2023-10-25 09:12:44", size: "1.2 KB" },
            { name: "script.js", url: "script.js", isDir: false, date: "2023-10-25 09:15:22", size: "4.5 KB" },
            { name: "very_large_video_file_test_render.mp4", url: "#", isDir: false, date: "2023-10-21 18:01:02", size: "1.4 GB" },
            { name: ".hidden_config", url: "#", isDir: false, date: "2023-10-20 11:11:11", size: "244 B" }
        ];

        const tbody = document.getElementById('directory-list');

        mockFiles.forEach(file => {
            const tr = document.createElement('tr');
            
            // Icon logic
            const icon = file.isDir ? '📁' : '📄';
            
            // Row HTML
            tr.innerHTML = `
                <td class="col-name">
                    <a href="${file.url}" title="${file.name}">
                        <span class="icon">${icon}</span>${file.name}
                    </a>
                </td>
                <td class="col-date">${file.date}</td>
                <td class="col-size">${file.size}</td>
            `;
            tbody.appendChild(tr);
        });
    </script>
</body>
</html>
